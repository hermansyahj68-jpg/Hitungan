<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PBR Texture Tool</title>

<!-- ICON -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- SEO -->
<meta name="description" content="Convert image into PBR texture maps automatically">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
background:#121212;
color:#e0e0e0;
text-align:center;
padding:20px;
margin:0;
}

header{
margin-bottom:25px;
}

header img{
width:160px;
margin-bottom:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:12px;
border:1px solid #333;
}

canvas{
width:100%;
border-radius:8px;
background:#000;
}

h3{
font-size:14px;
margin-bottom:10px;
color:#00ff88;
}

.controls{
background:#252525;
padding:20px;
border-radius:15px;
display:inline-block;
margin-bottom:25px;
}

input[type="file"]{
margin-bottom:15px;
}

.btn-zip{
background:#007bff;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
display:none;
}

.loading-text{
display:none;
color:#ffcc00;
margin-top:10px;
}

footer{
margin-top:40px;
opacity:0.6;
font-size:13px;
}

</style>

</head>


<body>

<header>

<img src="logo.png">

<h2>Image to PBR Texture Tool</h2>

<p>Convert image into PBR texture maps instantly</p>

</header>



<div class="controls">

<input type="file" id="upload" accept="image/*"><br>

<button id="downloadZip" class="btn-zip">
Download Semua sebagai ZIP
</button>

<div id="loading" class="loading-text">
Sedang memproses ZIP...
</div>

</div>



<div class="container">

<div class="card">
<h3>thumb.jpg</h3>
<canvas id="thumbCanvas"></canvas>
</div>

<div class="card">
<h3>color.jpg</h3>
<canvas id="colorCanvas"></canvas>
</div>

<div class="card">
<h3>bmp.jpg</h3>
<canvas id="heightCanvas"></canvas>
</div>

<div class="card">
<h3>normal.jpg</h3>
<canvas id="normalCanvas"></canvas>
</div>

</div>



<footer>
Created by Hermansyah
</footer>



<script>

const upload=document.getElementById("upload")
const btnZip=document.getElementById("downloadZip")
const loading=document.getElementById("loading")

const canvases={
thumb:document.getElementById("thumbCanvas"),
color:document.getElementById("colorCanvas"),
height:document.getElementById("heightCanvas"),
normal:document.getElementById("normalCanvas")
}


upload.addEventListener("change",e=>{

const file=e.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=event=>{

const img=new Image()

img.onload=()=>{
processPBR(img)
btnZip.style.display="inline-block"
}

img.src=event.target.result

}

reader.readAsDataURL(file)

})


function processPBR(img){

const size=512

Object.values(canvases).forEach(c=>{
c.width=size
c.height=size
})

const ctxColor=canvases.color.getContext("2d")
ctxColor.drawImage(img,0,0,size,size)

const ctxThumb=canvases.thumb.getContext("2d")
ctxThumb.drawImage(img,0,0,size,size)

const imgData=ctxColor.getImageData(0,0,size,size)
const data=imgData.data

const ctxHeight=canvases.height.getContext("2d")
const heightData=ctxHeight.createImageData(size,size)

for(let i=0;i<data.length;i+=4){

let v=(data[i]+data[i+1]+data[i+2])/3

heightData.data[i]=v
heightData.data[i+1]=v
heightData.data[i+2]=v
heightData.data[i+3]=255

}

ctxHeight.putImageData(heightData,0,0)


const ctxNormal=canvases.normal.getContext("2d")
const normalData=ctxNormal.createImageData(size,size)

for(let y=0;y<size;y++){

for(let x=0;x<size;x++){

let i=(y*size+x)*4

let xL=data[((y*size+Math.max(x-1,0))*4)]
let xR=data[((y*size+Math.min(x+1,size-1))*4)]

let yU=data[((Math.max(y-1,0)*size+x)*4)]
let yD=data[((Math.min(y+1,size-1)*size+x)*4)]

normalData.data[i]=(xL-xR)+128
normalData.data[i+1]=(yU-yD)+128
normalData.data[i+2]=255
normalData.data[i+3]=255

}

}

ctxNormal.putImageData(normalData,0,0)

}



btnZip.addEventListener("click",async()=>{

loading.style.display="block"
btnZip.disabled=true

const zip=new JSZip()

for(const name in canvases){

const dataUrl=canvases[name].toDataURL("image/jpeg",0.9)
const base64=dataUrl.split(",")[1]

zip.file(name+".jpg",base64,{base64:true})

}

const content=await zip.generateAsync({type:"blob"})

const link=document.createElement("a")
link.href=URL.createObjectURL(content)
link.download="PBR_Textures.zip"
link.click()

loading.style.display="none"
btnZip.disabled=false

})



// SERVICE WORKER

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}
  <!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Penghitung Belanja</title>

 
  
<!-- ICON -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

  
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 20px;
    }

    h2, h3 {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      display: inline-block;
    }

    h2 {
      margin-right: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      border: 5px solid #777;
    }

    th, td {
      border: 5px solid #777;
      padding: 16px;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      text-align: center;
      font-weight: bold;
    }

    #areaBelanja {
      background: #FFDFFD7A;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    td button {
      background-color: #ff4d4d;
      color: black;
      font-size: 18px;
      padding: 10px 20px;
    }

    td button:hover {
      opacity: 0.9;
    }

    #filename {
      padding: 8px;
      font-size: 16px;
      width: 300px;
      margin-top: 10px;
    }

    .actions {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div id="areaBelanja">
  <h2>🛒 Penghitung </h2>
  <h3>Total Harga : Rp: <span id="total">0</span></h3>

  <table id="tabelBelanja">
    <thead>
      <tr>
        <th>Nama Barang</th>
        <th>Jumlah</th>
        <th>Harga Satuan</th>
        <th>Total</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="text" class="nama-barang" placeholder="Nama"></td>
        <td><input type="text" class="jumlah" value="" oninput="formatAngka(this); hitungTotal()"></td>
        <td><input type="text" class="harga" value="" oninput="formatAngka(this); hitungTotal()"></td>
        <td class="subtotal">0</td>
        <td><button onclick="hapusBaris(this)">Hapus</button></td>
      </tr>
    </tbody>
  </table>
</div>

<div class="actions">
  <label for="filename">📝 Nama file gambar:</label>
  <input type="text" id="filename" placeholder="Contoh: struk-belanja-ibu" value="belanja">
  <br><br>
  <button onclick="tambahBaris()">+ Tambah Barang</button>
  <button onclick="simpanSebagaiGambar()">📷 Simpan Gambar</button>
</div>

<script>
  function formatAngka(input) {
    let angka = input.value.replace(/\D/g, "");
    if (angka === "") angka = "0";
    input.value = parseInt(angka).toLocaleString("id-ID");
  }

  function parseAngka(str) {
    return parseInt(str.replace(/\./g, "")) || 0;
  }

  function hitungTotal() {
    const rows = document.querySelectorAll("#tabelBelanja tbody tr");
    let total = 0;
    rows.forEach(row => {
      const jumlah = parseAngka(row.querySelector(".jumlah").value);
      const harga = parseAngka(row.querySelector(".harga").value);
      const subtotal = jumlah * harga;
      row.querySelector(".subtotal").textContent = subtotal.toLocaleString('id-ID');
      total += subtotal;
    });
    document.getElementById("total").textContent = total.toLocaleString('id-ID');
  }

  function tambahBaris() {
    const tbody = document.querySelector("#tabelBelanja tbody");
    const barisBaru = document.createElement("tr");
    barisBaru.innerHTML = `
      <td><input type="text" class="nama-barang" placeholder="Nama"></td>
      <td><input type="text" class="jumlah" value="0" oninput="formatAngka(this); hitungTotal()"></td>
      <td><input type="text" class="harga" value="0" oninput="formatAngka(this); hitungTotal()"></td>
      <td class="subtotal">0</td>
      <td><button onclick="hapusBaris(this)">Hapus</button></td>
    `;
    tbody.appendChild(barisBaru);
  }

  function hapusBaris(button) {
    button.parentNode.parentNode.remove();
    hitungTotal();
  }

  function simpanSebagaiGambar() {
    const namaFile = document.getElementById("filename").value.trim() || "belanja";
    const area = document.getElementById("areaBelanja");

    html2canvas(area).then(canvas => {
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = namaFile + ".png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("✅ Gambar berhasil disimpan dengan nama: " + namaFile + ".png\nCek folder Unduhan (Download).");
      });
    });
  }

  hitungTotal(); // inisialisasi saat awal


// SERVICE WORKER


if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}
</script>
</body>
</html>

</script>

</body>
</html>
